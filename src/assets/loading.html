<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finch Thinking Loader</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
    }

    /* ── Loader wrapper ── */
    .finch-loader {
      width: 320px;
    }

    /* Hide/show utility */
    .finch-loader.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       FINCH THINKING LOADER
       Usage:
         Show  → document.getElementById('finch-loader').classList.remove('hidden')
         Hide  → document.getElementById('finch-loader').classList.add('hidden')
  ══════════════════════════════════════ -->
  <div class="finch-loader" id="finch-loader">
    <svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap');

          @keyframes spin1 {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
          }
          @keyframes spin1r {
            from { transform: rotate(0deg); }
            to   { transform: rotate(-360deg); }
          }
          @keyframes spin2 {
            from { transform: rotate(120deg); }
            to   { transform: rotate(480deg); }
          }
          @keyframes fade-text {
            0%, 100% { opacity: 0.45; }
            50%       { opacity: 1; }
          }

          .orbit-arm-1 {
            transform-origin: 340px 160px;
            animation: spin1 1.6s linear infinite;
          }
          .orbit-arm-2 {
            transform-origin: 340px 160px;
            animation: spin1r 2.4s linear infinite;
          }
          .orbit-arm-3 {
            transform-origin: 340px 160px;
            animation: spin2 1.9s linear infinite;
          }
          .thinking-text {
            animation: fade-text 2s ease-in-out infinite;
          }
        </style>
      </defs>

      <!-- Orbit rings -->
      <circle cx="340" cy="160" r="110" fill="none" stroke="#E8552A" stroke-width="0.5" opacity="0.15"/>
      <circle cx="340" cy="160" r="72"  fill="none" stroke="#E8552A" stroke-width="0.5" opacity="0.12"/>

      <!-- Orbiting dots -->
      <g class="orbit-arm-1">
        <circle cx="340" cy="50" r="8" fill="#E8552A" opacity="0.85"/>
      </g>
      <g class="orbit-arm-2">
        <circle cx="340" cy="50" r="5" fill="#E8552A" opacity="0.25"/>
      </g>
      <g class="orbit-arm-3">
        <circle cx="340" cy="88" r="6" fill="#E8552A" opacity="0.85"/>
      </g>

      <!-- Thinking dots -->
      <circle cx="320" cy="248" r="4" fill="#E8552A">
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" begin="0s"   repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="248" r="4" fill="#E8552A">
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="360" cy="248" r="4" fill="#E8552A">
        <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
      </circle>

      <!-- "Finch is thinking…" label -->
      <text
        x="340" y="310"
        text-anchor="middle"
        font-family="'Nunito', sans-serif"
        font-size="13"
        font-weight="600"
        fill="#E8552A"
        letter-spacing="0.5"
        class="thinking-text"
      >Finch is thinking…</text>
    </svg>
  </div>

  <!-- ══════════════════════════════════════
       DEMO TOGGLE — remove in production
  ══════════════════════════════════════ -->
  <script>
    // Demo: auto-hide after 5s to simulate a response arriving
    // Remove this block in your real implementation
    const loader = document.getElementById('finch-loader');
    setTimeout(() => loader.classList.add('hidden'), 5000);
  </script>

</body>
</html>
